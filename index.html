<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>БЕГОМЕР</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="БЕГОМЕР">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5231/5231678.png">

    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --accent-color: #ff5722;
            --clear-color: #2c2c2e;
            --text-color: #ffffff;
            --muted-text: #b0b0b0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--card-color);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin-top: 10px;
            display: flex;
            flex-direction: column;
        }

        .title-container {
            text-align: center;
            margin-top: 5px;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: flex-start; /* Идеальное выравнивание элементов по верху */
            margin: 0;
        }

        /* Аккуратная оранжевая надпись FREE ровно по верху текста */
        .badge-free {
            font-size: 11px;
            font-weight: bold;
            color: var(--accent-color);
            margin-left: 5px;
            margin-top: 2px; /* Микро-смещение для идеального выравнивания по сетке шрифта */
            letter-spacing: 0;
        }

        p.subtitle {
            text-align: center;
            font-size: 13px;
            color: var(--muted-text);
            margin-top: 0;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        label {
            font-size: 15px;
            font-weight: 600;
            color: var(--muted-text);
        }

        .group-clear-btn {
            font-size: 13px;
            color: var(--accent-color);
            font-weight: 500;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
            padding: 2px 5px;
        }

        .inputs-row {
            display: flex;
            gap: 10px;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            box-sizing: border-box;
            -webkit-appearance: none;
        }

        input:focus {
            outline: none;
            border-color: #555;
        }

        input::placeholder {
            color: #444;
            font-weight: normal;
        }

        button#main_btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s, transform 0.1s, color 0.2s;
        }

        .btn-calculate {
            background-color: var(--accent-color);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(255, 87, 34, 0.3);
        }
        .btn-calculate:active {
            background-color: #e64a19;
            transform: scale(0.98);
        }

        .btn-clear {
            background-color: var(--clear-color);
            color: var(--accent-color);
            box-shadow: none;
        }
        .btn-clear:active {
            background-color: #222224;
            transform: scale(0.98);
        }

        .error {
            color: #ff453a;
            text-align: center;
            font-size: 14px;
            margin-top: 12px;
            min-height: 20px;
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }

        .footer div {
            margin-bottom: 2px;
        }

        /* Спокойный не жирный шрифт для ссылки */
        .footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: normal; 
            border-bottom: 1px dashed var(--accent-color);
        }

        .footer a:hover {
            border-bottom-style: solid;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="title-container">
        <h1>БЕГОМЕР<span class="badge-free">FREE</span></h1>
    </div>
    <p class="subtitle">Заполните любые 2 поля и нажмите «Рассчитать»</p>

    <div class="input-group">
        <div class="label-row">
            <div class="label-wrapper">
                <label>Дистанция, км</label>
            </div>
            <span class="group-clear-btn" id="clear_dist_btn" onclick="clearGroup('dist')">очистить</span>
        </div>
        <div class="inputs-row">
            <input type="number" id="distance" step="0.01" placeholder="0.00" inputmode="decimal">
        </div>
    </div>

    <div class="input-group">
        <div class="label-row">
            <label>Общее время</label>
            <span class="group-clear-btn" id="clear_time_btn" onclick="clearGroup('time')">очистить</span>
        </div>
        <div class="inputs-row">
            <div style="flex: 1;">
                <input type="number" id="time_h" placeholder="ЧЧ" min="0" max="99" inputmode="numeric">
            </div>
            <div style="flex: 1;">
                <input type="number" id="time_m" placeholder="ММ" min="0" max="59" inputmode="numeric">
            </div>
            <div style="flex: 1;">
                <input type="number" id="time_s" placeholder="СС" min="0" max="59" inputmode="numeric">
            </div>
        </div>
    </div>

    <div class="input-group">
        <div class="label-row">
            <label>Темп, мин/км</label>
            <span class="group-clear-btn" id="clear_pace_btn" onclick="clearGroup('pace')">очистить</span>
        </div>
        <div class="inputs-row">
            <div style="flex: 1;">
                <input type="number" id="pace_m" placeholder="ММ" min="0" max="59" inputmode="numeric">
            </div>
            <div style="flex: 1;">
                <input type="number" id="pace_s" placeholder="СС" min="0" max="59" inputmode="numeric">
            </div>
        </div>
    </div>

    <button id="main_btn" class="btn-clear" onclick="handleMainAction()">Очистить</button>
    
    <div class="error" id="error_msg"></div>

    <div class="footer">
        <div>© 2026 Алексей Щербак</div>
        <div>Понравилось? <a href="https://t.me/scherbak_stroit" target="_blank">Подпишись</a> вместо «спасибо»</div>
    </div>
</div>

<script>
    const inputs = ['distance', 'time_h', 'time_m', 'time_s', 'pace_m', 'pace_s'];
    
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', updateUI);
    });

    function updateUI() {
        const distStr = document.getElementById('distance').value;
        const hasDist = distStr.trim() !== '';

        const th = document.getElementById('time_h').value;
        const tm = document.getElementById('time_m').value;
        const ts = document.getElementById('time_s').value;
        const hasTime = th.trim() !== '' || tm.trim() !== '' || ts.trim() !== '';

        const pm = document.getElementById('pace_m').value;
        const ps = document.getElementById('pace_s').value;
        const hasPace = pm.trim() !== '' || ps.trim() !== '';

        toggleClearBtn('clear_dist_btn', hasDist);
        toggleClearBtn('clear_time_btn', hasTime);
        toggleClearBtn('clear_pace_btn', hasPace);

        const filledCount = [hasDist, hasTime, hasPace].filter(Boolean).length;
        const mainBtn = document.getElementById('main_btn');

        if (filledCount === 2) {
            mainBtn.innerText = "Рассчитать";
            mainBtn.className = "btn-calculate";
        } else {
            mainBtn.innerText = "Очистить";
            mainBtn.className = "btn-clear";
        }
    }

    function toggleClearBtn(btnId, show) {
        const btn = document.getElementById(btnId);
        if (show) {
            btn.style.opacity = "1";
            btn.style.pointerEvents = "auto";
        } else {
            btn.style.opacity = "0";
            btn.style.pointerEvents = "none";
        }
    }

    function clearGroup(group) {
        if (group === 'dist') {
            document.getElementById('distance').value = '';
        } else if (group === 'time') {
            document.getElementById('time_h').value = '';
            document.getElementById('time_m').value = '';
            document.getElementById('time_s').value = '';
        } else if (group === 'pace') {
            document.getElementById('pace_m').value = '';
            document.getElementById('pace_s').value = '';
        }
        document.getElementById('error_msg').innerText = '';
        updateUI();
    }

    function handleMainAction() {
        const mainBtn = document.getElementById('main_btn');
        if (mainBtn.innerText === "Рассчитать") {
            calculate();
        } else {
            clearAll();
        }
    }

    function clearAll() {
        inputs.forEach(id => document.getElementById(id).value = '');
        document.getElementById('error_msg').innerText = '';
        updateUI();
    }

    function calculate() {
        const errorDiv = document.getElementById('error_msg');
        errorDiv.innerText = '';

        const distStr = document.getElementById('distance').value;
        const dist = distStr ? parseFloat(distStr) : 0;

        const th = parseInt(document.getElementById('time_h').value) || 0;
        const tm = parseInt(document.getElementById('time_m').value) || 0;
        const ts = parseInt(document.getElementById('time_s').value) || 0;
        const totalTimeSec = (th * 3600) + (tm * 60) + ts;

        const pm = parseInt(document.getElementById('pace_m').value) || 0;
        const ps = parseInt(document.getElementById('pace_s').value) || 0;
        const totalPaceSec = (pm * 60) + ps;

        const hasDist = dist > 0;
        const hasTime = totalTimeSec > 0;
        const hasPace = totalPaceSec > 0;

        if (hasDist && hasTime) {
            let paceSecPerKm = totalTimeSec / dist;
            let resMin = Math.floor(paceSecPerKm / 60);
            let resSec = Math.round(paceSecPerKm % 60);
            
            if (resSec === 60) {
                resSec = 0;
                resMin += 1;
            }
            document.getElementById('pace_m').value = resMin;
            document.getElementById('pace_s').value = resSec;
            
        } else if (hasDist && hasPace) {
            let resTimeSec = dist * totalPaceSec;
            let resH = Math.floor(resTimeSec / 3600);
            let resM = Math.floor((resTimeSec % 3600) / 60);
            let resS = Math.round(resTimeSec % 60);

            if (resS === 60) {
                resS = 0;
                resM += 1;
            }
            if (resM === 60) {
                resM = 0;
                resH += 1;
            }

            document.getElementById('time_h').value = resH > 0 ? resH : '';
            document.getElementById('time_m').value = resM;
            document.getElementById('time_s').value = resS;

        } else if (hasTime && hasPace) {
            const resDist = totalTimeSec / totalPaceSec;
            document.getElementById('distance').value = resDist.toFixed(2);
        }

        updateUI();
    }

    updateUI();
</script>

</body>
</html>
